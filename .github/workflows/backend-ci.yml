name: backend-ci

on:
  pull_request:
    paths:
      - "backend/**"
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      WEBHOOK_SECRET: "ci-dummy-webhook-secret"
      JWT_SECRET: "ci-dummy-jwt-secret"
      OPENAI_API_KEY: "ci-dummy-openai-key"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Lint
        working-directory: backend
        run: uv run ruff check .

      - name: Type check
        working-directory: backend
        run: uv run mypy app

      - name: Run tests
        working-directory: backend
        run: uv run pytest -v
